name: deploy-mz-escaper

# 백엔드(키를 쥐는 쪽) 배포. 서버가 직접 git pull 후 재빌드·기동한다.
# 배포 전 테스트 게이트: fmt·clippy·test 가 깨지면 운영에 나가지 않는다.
#
# 유저에게 배포되는 exe 는 이 워크플로와 무관하다. 그건 태그를 밀 때 release.yml 이 낸다.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "static/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/deploy.yml"
  # PR 에서는 검사만 하고 배포하지 않는다(아래 deploy 잡의 if 조건).
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # rust-toolchain.toml 이 채널과 컴포넌트(clippy, rustfmt)를 고정한다.
      # 러너의 기본 툴체인이 아니라 이 레포가 지정한 것으로 붙는다.
      - name: Rust 캐시
        uses: Swatinem/rust-cache@v2

      - name: 포맷 검사
        run: cargo fmt --check

      - name: 린트
        run: cargo clippy --all-targets -- -D warnings

      - name: 테스트
        run: cargo test

  deploy:
    needs: check
    # PR 에서는 돌지 않는다. main 에 실제로 들어온 것만 배포한다.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      # 서버가 직접 git pull 후 재빌드·기동한다.
      # .env 는 gitignore 대상이라 reset --hard 가 건드리지 않는다 — 서버의 키가 날아가지 않는다.
      - name: Deploy via git pull
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            set -e
            cd ~/mz-escaper
            git fetch --prune origin
            git reset --hard origin/main
            docker compose up -d --build
            # 컨테이너가 실제로 응답하는지 확인한다. 여기서 실패하면 워크플로가 빨간불이 된다.
            sleep 5
            curl -fsS http://127.0.0.1:8080/healthz
