<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MZ 탈출기</title>
<!-- 저장된 테마를 화면이 그려지기 전에 먼저 입힌다. 여기서 하지 않으면 기본 색으로
     한 번 깜빡였다가 테마 색으로 바뀌는 플래시가 보인다. -->
<script>
  try {
    var savedTheme = localStorage.getItem('mz-theme');
    if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
    // 글자 크기도 렌더 전에 입혀야 크기가 바뀌며 다시 그려지는 깜빡임이 없다.
    var savedFont = localStorage.getItem('mz-font');
    if (savedFont) document.documentElement.style.setProperty('--chat-font', savedFont + 'px');
  } catch (e) { /* 프라이빗 모드 등에서 localStorage 접근 실패는 무시 */ }
</script>
<style>
  /* 폰트는 시스템 폰트만 쓴다. 웹폰트를 받지 않으므로 첫 화면이 즉시 뜬다. */
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --border: #262b36;
    --text: #e6e8ec;
    --muted: #8b93a1;
    --accent: #6ea8fe;
    --user-bubble: #2b5cd8;
    --bot-bubble: #21262f;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --border: #e2e5ea;
      --text: #1b1f26;
      --muted: #6b7280;
      --accent: #2563eb;
      --user-bubble: #2563eb;
      --bot-bubble: #eef0f4;
    }
  }

  /* ── MZ 테마 ──
     data-theme 가 붙으면 시스템 자동 색(:root, prefers-color-scheme)을 덮어쓴다.
     선택자 특이도가 :root 보다 높아(속성 선택자 포함) 미디어쿼리보다 우선한다.
     각 테마는 MZ 세대 사이에서 유행한 먹거리에서 색을 땄다. */

  /* 요거트: 크리미한 우윳빛 배경에 베리핑크 포인트 */
  :root[data-theme="yogurt"] {
    --bg: #fdf5f2;
    --panel: #ffffff;
    --border: #f2e2db;
    --text: #4a3b39;
    --muted: #b09a94;
    --accent: #e5809f;
    --user-bubble: #e5809f;
    --bot-bubble: #f8ebe6;
  }

  /* 탕후루: 설탕 코팅의 새빨간 캔디 레드 */
  :root[data-theme="tanghulu"] {
    --bg: #fff3f2;
    --panel: #ffffff;
    --border: #ffd7d1;
    --text: #5a1f1f;
    --muted: #c78d88;
    --accent: #e5352f;
    --user-bubble: #e5352f;
    --bot-bubble: #ffe1dc;
  }

  /* 말차: 곱게 간 녹차의 연둣빛~짙은 녹색 */
  :root[data-theme="matcha"] {
    --bg: #f2f6ec;
    --panel: #ffffff;
    --border: #dde7cd;
    --text: #303d22;
    --muted: #8a9a74;
    --accent: #789a3c;
    --user-bubble: #789a3c;
    --bot-bubble: #e7efdb;
  }

  /* 두바이 초콜릿: 짙은 초콜릿 바탕에 피스타치오 그린 포인트 (유일한 다크 테마) */
  :root[data-theme="dubai"] {
    --bg: #241a15;
    --panel: #2f2119;
    --border: #3f2d22;
    --text: #f1e7dd;
    --muted: #b39a88;
    --accent: #8fb84e;
    --user-bubble: #8fb84e;
    --bot-bubble: #3a2a20;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    font: 15px/1.6 -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
  }
  main {
    width: min(760px, 100%);
    height: 100%;
    display: flex;
    flex-direction: column;
    background: var(--panel);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }

  /* ── 헤더 ── */
  header {
    position: relative;           /* 테마 팝오버의 기준점 */
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
  }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; }
  /* 제목 옆에 붙는 버전. 존재감이 없도록 작고 흐리게 둔다. */
  .brand { display: flex; align-items: baseline; gap: 8px; }
  .version { font-size: 11px; color: var(--muted); opacity: .55; }
  .header-actions { display: flex; align-items: center; gap: 8px; }
  #reset {
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 5px 10px; border-radius: 6px; font-size: 13px; cursor: pointer;
  }
  #reset:hover { color: var(--text); border-color: var(--muted); }
  /* 아이콘 버튼(설정 톱니바퀴 등) */
  .icon-btn {
    display: inline-flex; align-items: center; justify-content: center;
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 5px; border-radius: 6px; cursor: pointer;
  }
  .icon-btn:hover { color: var(--text); border-color: var(--muted); }
  .icon-btn svg { display: block; }

  /* ── 설정 팝오버 ── */
  .settings-menu {
    position: absolute; top: 52px; right: 18px; z-index: 10;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px; min-width: 200px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, .18);
  }
  .settings-menu[hidden] { display: none; }
  /* 섹션 사이 구분선. 나중에 설정 항목이 늘어나도 이 구조를 그대로 쓴다. */
  .settings-section + .settings-section {
    margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border);
  }
  .settings-label { font-size: 11px; color: var(--muted); padding: 2px 10px 6px; }
  .theme-item {
    display: flex; align-items: center; gap: 10px; width: 100%;
    padding: 8px 10px; border: none; border-radius: 7px; cursor: pointer;
    background: transparent; color: var(--text); font: inherit; font-size: 13px; text-align: left;
  }
  .theme-item:hover { background: var(--bot-bubble); }
  /* 각 테마를 대표하는 색 점 */
  .theme-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; border: 1px solid rgba(0, 0, 0, .12); }
  .theme-name { flex: 1; }               /* 이름이 남는 공간을 차지해 표식들을 오른쪽으로 민다 */
  .theme-moon { display: inline-flex; color: var(--muted); }   /* 다크 테마 표식(초승달) */
  /* 현재 선택된 테마에 체크 표시 */
  .theme-item[aria-checked="true"] { font-weight: 600; }
  .theme-item[aria-checked="true"]::after { content: "✓"; color: var(--accent); }

  /* 글자 크기 세그먼트 버튼 */
  .seg { display: flex; gap: 4px; padding: 0 10px; }
  .seg button {
    flex: 1; padding: 6px 0; border: 1px solid var(--border); border-radius: 7px;
    background: transparent; color: var(--muted); cursor: pointer; font: inherit; font-size: 12px;
  }
  .seg button:hover { color: var(--text); }
  .seg button[aria-pressed="true"] { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* 토글 행: 라벨 + 스위치 */
  .toggle-row {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 7px 10px; font-size: 13px; cursor: pointer;
  }
  /* 켜고 끄는 스위치. 기본 체크박스 모양을 지우고 알약형으로 그린다. */
  .switch {
    appearance: none; -webkit-appearance: none; position: relative; flex-shrink: 0;
    width: 34px; height: 20px; border-radius: 999px; background: var(--border);
    cursor: pointer; transition: background .15s;
  }
  .switch:checked { background: var(--accent); }
  .switch::after {
    content: ""; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px;
    border-radius: 50%; background: #fff; transition: left .15s;
  }
  .switch:checked::after { left: 16px; }

  /* ── 말투 선택 ── */
  #tone-bar { padding: 12px 18px; border-bottom: 1px solid var(--border); }
  #tone-bar .label { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  #presets { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    padding: 5px 11px; border-radius: 999px; cursor: pointer; font-size: 13px;
    background: transparent; color: var(--muted);
    border: 1px solid var(--border);
  }
  .chip:hover { color: var(--text); }
  .chip[aria-pressed="true"] {
    background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500;
  }
  #custom-wrap { margin-top: 10px; display: none; }
  #custom-wrap.show { display: block; }
  #custom-tone {
    width: 100%; padding: 8px 10px; border-radius: 8px; resize: none;
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    font: inherit; font-size: 14px;
  }
  #custom-tone:focus { outline: none; border-color: var(--accent); }
  #custom-count { font-size: 11px; color: var(--muted); text-align: right; margin-top: 3px; }

  /* ── 대화 ── */
  /* 대화 글자 크기는 설정으로 바꾼다(--chat-font). 말풍선이 이 크기를 물려받는다. */
  #log { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 12px; font-size: var(--chat-font, 15px); }
  .msg { max-width: 78%; padding: 9px 13px; border-radius: 14px; white-space: pre-wrap; word-break: break-word; }
  .msg.user { align-self: flex-end; background: var(--user-bubble); color: #fff; border-bottom-right-radius: 4px; }
  .msg.bot  { align-self: flex-start; background: var(--bot-bubble); border-bottom-left-radius: 4px; }
  .msg.error { align-self: center; background: transparent; color: #ef4444; font-size: 13px; max-width: 100%; text-align: center; }
  /* 응답을 기다리는 동안 깜빡이는 커서. 스트리밍이 시작되면 첫 글자가 바로 덮어쓴다. */
  .msg.bot.pending::after {
    content: "▋"; color: var(--muted);
    animation: blink 1s steps(2, start) infinite;
  }
  @keyframes blink { to { visibility: hidden; } }
  #empty { margin: auto; color: var(--muted); font-size: 14px; text-align: center; }

  /* ── 입력 ── */
  footer { display: flex; gap: 8px; padding: 12px 18px; border-top: 1px solid var(--border); }
  #input {
    flex: 1; padding: 10px 12px; border-radius: 10px; resize: none; max-height: 140px;
    background: var(--bg); color: var(--text); border: 1px solid var(--border); font: inherit;
  }
  #input:focus { outline: none; border-color: var(--accent); }
  #send {
    padding: 0 18px; border: none; border-radius: 10px; cursor: pointer;
    background: var(--accent); color: #fff; font-weight: 600; font-size: 14px;
  }
  #send:disabled { opacity: .5; cursor: default; }

  /* ── 업데이트 배너 ──
     새 버전이 있을 때만 나타난다. 강제 업데이트는 서버가 켜질 때 알아서 끝내므로
     여기 오지 않는다. 즉 이 배너는 항상 "미뤄도 되는" 업데이트다. */
  #update-bar {
    display: none; align-items: center; gap: 10px;
    padding: 10px 18px; border-bottom: 1px solid var(--border);
    background: #1e293b; font-size: 13px;
  }
  #update-bar.show { display: flex; }
  #update-text { flex: 1; }
  #update-text strong { color: var(--accent); }
  #update-notes { color: var(--muted); }
  #update-bar button {
    padding: 6px 12px; border-radius: 8px; cursor: pointer;
    border: 1px solid var(--border); background: transparent; color: var(--text); font: inherit;
  }
  #update-now { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  #update-bar button:disabled { opacity: .5; cursor: default; }
</style>
</head>
<body>
<main>
  <header>
    <div class="brand">
      <h1>MZ 탈출기</h1>
      <span id="version" class="version"></span>
    </div>
    <div class="header-actions">
      <button id="reset" type="button">대화 초기화</button>
      <button id="settings-toggle" class="icon-btn" type="button" aria-haspopup="true" aria-expanded="false" title="설정">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </div>
    <!-- 설정 팝오버. 지금은 테마만 담고, 항목이 늘면 settings-section 을 이어 붙인다. -->
    <div id="settings-menu" class="settings-menu" role="menu" hidden>
      <div class="settings-section">
        <div class="settings-label">테마</div>
        <!-- 테마 항목은 JS(THEMES)가 유일한 출처라 여기서 그린다. -->
        <div id="theme-list"></div>
      </div>
      <div class="settings-section">
        <div class="settings-label">글자 크기</div>
        <div id="font-seg" class="seg">
          <button type="button" data-size="13">작게</button>
          <button type="button" data-size="15">보통</button>
          <button type="button" data-size="18">크게</button>
        </div>
      </div>
      <div class="settings-section">
        <label class="toggle-row" for="opt-remember-tone">
          <span>마지막 말투 기억</span>
          <input id="opt-remember-tone" type="checkbox" class="switch">
        </label>
        <!-- 자동 실행은 Windows 에서만 지원. 비지원 플랫폼이면 JS가 이 행을 숨긴다. -->
        <label id="autostart-row" class="toggle-row" for="opt-autostart">
          <span>Windows 시작 시 실행</span>
          <input id="opt-autostart" type="checkbox" class="switch">
        </label>
      </div>
    </div>
  </header>

  <aside id="update-bar">
    <div id="update-text"></div>
    <button id="update-now" type="button">지금 업데이트</button>
    <button id="update-later" type="button">나중에</button>
  </aside>

  <section id="tone-bar">
    <div class="label">말투</div>
    <div id="presets"></div>
    <div id="custom-wrap">
      <textarea id="custom-tone" rows="2"
        placeholder="예: 20대가 쓰는 인터넷 밈 말투로, 리액션 크게"></textarea>
      <div id="custom-count"></div>
    </div>
  </section>

  <div id="log"><div id="empty">말투를 고르고 아무 말이나 걸어보세요.</div></div>

  <footer>
    <textarea id="input" rows="1" placeholder="메시지를 입력하세요" title="Enter 전송 · Shift+Enter 줄바꿈"></textarea>
    <button id="send" type="button">전송</button>
  </footer>
</main>

<script>
// ─────────────────────────────────────────────────────────────
// 상태.
// 이건 대화가 아니라 말투 변환이다. 매 요청은 서로 독립적이라 이전에 주고받은 내용을
// 다음 요청에 싣지 않는다. 화면의 로그는 지난 변환 결과를 보여줄 뿐, 모델에는 지금
// 입력한 문장 하나만 간다. (그래야 같은 문장을 말투만 바꿔 다시 넣어도 "말을 반복하시네요"
// 같은 맥락 반응이 나오지 않는다.)
// ─────────────────────────────────────────────────────────────
let toneId = null;            // 선택된 말투 id
let maxCustomChars = 200;     // 서버가 알려주는 직접입력 상한
let busy = false;             // 응답을 받는 중이면 true (중복 전송 방지)
// "마지막 말투 기억" 설정. 기본 켜짐('0'일 때만 꺼짐). 켜져 있으면 고른 말투를 저장해
// 다음 실행 때 그 말투로 시작한다.
let rememberTone = localStorage.getItem('mz-remember-tone') !== '0';

const $log = document.getElementById('log');
const $presets = document.getElementById('presets');
const $customWrap = document.getElementById('custom-wrap');
const $customTone = document.getElementById('custom-tone');
const $customCount = document.getElementById('custom-count');
const $input = document.getElementById('input');
const $send = document.getElementById('send');
const $reset = document.getElementById('reset');

// ─────────────────────────────────────────────────────────────
// 말투 버튼 그리기. 목록은 서버(tone.rs)가 유일한 출처다.
// ─────────────────────────────────────────────────────────────
async function loadPresets() {
  const res = await fetch('/api/presets');
  const data = await res.json();
  maxCustomChars = data.maxCustomToneChars;

  const items = [...data.presets, { id: 'custom', label: '✎ 직접 입력' }];
  for (const p of items) {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.type = 'button';
    btn.textContent = p.label;
    btn.setAttribute('aria-pressed', 'false');
    btn.onclick = () => selectTone(p.id);
    btn.dataset.id = p.id;
    $presets.appendChild(btn);
  }

  // 직접입력 내용도 복원한다(말투가 custom 이 아니어도 미리 채워 두면 다시 고를 때 편하다).
  const savedCustom = localStorage.getItem('mz-custom-tone');
  if (savedCustom != null) $customTone.value = savedCustom;

  // "마지막 말투 기억"이 켜져 있고 저장된 말투가 아직 유효하면 그걸로 시작한다.
  const ids = items.map((p) => p.id);
  let initial = items[0].id;  // 기본은 첫 프리셋
  if (rememberTone) {
    const saved = localStorage.getItem('mz-default-tone');
    if (saved && ids.includes(saved)) initial = saved;
  }
  selectTone(initial);
  updateCustomCount();
}

function selectTone(id) {
  toneId = id;
  for (const btn of $presets.children) {
    btn.setAttribute('aria-pressed', String(btn.dataset.id === id));
  }
  $customWrap.classList.toggle('show', id === 'custom');
  if (id === 'custom') $customTone.focus();

  // 기억이 켜져 있으면 다음 실행 때 복원할 수 있게 저장한다.
  if (rememberTone) {
    try { localStorage.setItem('mz-default-tone', id); } catch (e) { /* 무시 */ }
  }
}

function updateCustomCount() {
  const n = [...$customTone.value].length;   // 스프레드로 세야 이모지·한글이 정확히 1자
  $customCount.textContent = `${n} / ${maxCustomChars}`;
  $customCount.style.color = n > maxCustomChars ? '#ef4444' : '';
}
$customTone.addEventListener('input', () => {
  updateCustomCount();
  // 직접입력 내용도 저장해 다음 실행 때 복원한다.
  try { localStorage.setItem('mz-custom-tone', $customTone.value); } catch (e) { /* 무시 */ }
});

// ─────────────────────────────────────────────────────────────
// 화면에 말풍선 추가
// ─────────────────────────────────────────────────────────────
function addBubble(kind, text) {
  document.getElementById('empty')?.remove();
  const el = document.createElement('div');
  el.className = `msg ${kind}`;
  el.textContent = text;          // textContent라 HTML이 섞여도 그대로 문자로 표시된다
  $log.appendChild(el);
  $log.scrollTop = $log.scrollHeight;
  return el;
}

// ─────────────────────────────────────────────────────────────
// 전송 → SSE 수신
// ─────────────────────────────────────────────────────────────
async function send() {
  if (busy) return;

  const text = $input.value.trim();
  if (!text) return;

  if (toneId === 'custom' && !$customTone.value.trim()) {
    addBubble('error', '직접 입력 말투를 적어주세요.');
    return;
  }

  busy = true;
  $send.disabled = true;
  $input.value = '';
  $input.style.height = 'auto';

  addBubble('user', text);

  // 빈 말풍선을 먼저 띄우고, 토큰이 도착할 때마다 여기에 이어 붙인다.
  const $bot = addBubble('bot', '');
  $bot.classList.add('pending');
  let answer = '';

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        // 지금 입력한 문장 하나만 보낸다. 이전 턴은 싣지 않는다 — 각 변환은 독립적이다.
        messages: [{ role: 'user', content: text }],
        tone: toneId,
        custom_tone: toneId === 'custom' ? $customTone.value : null,
      }),
    });

    // 서버가 에러를 낼 때는 SSE가 아니라 JSON을 준다.
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `요청 실패 (${res.status})`);
    }

    // ── SSE 파싱 ──
    // 스트림은 청크 경계가 줄 단위와 일치하지 않는다. 예를 들어 "data: {"만 오고
    // 나머지가 다음 청크에 올 수 있다. 그래서 버퍼에 쌓아 두고 완결된 줄만 꺼내 쓴다.
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });

      // 마지막 조각은 아직 완결되지 않았을 수 있으므로 버퍼에 남겨 둔다.
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed.startsWith('data:')) continue;

        const payload = trimmed.slice(5).trim();
        if (payload === '[DONE]') continue;

        try {
          const delta = JSON.parse(payload).choices?.[0]?.delta?.content;
          if (delta) {
            answer += delta;
            $bot.classList.remove('pending');
            $bot.textContent = answer;
            $log.scrollTop = $log.scrollHeight;
          }
        } catch {
          // 파싱 못 한 줄(하트비트, 주석 등)은 그냥 무시한다.
        }
      }
    }

    if (!answer) {
      $bot.remove();
      addBubble('error', '빈 응답을 받았습니다.');
    }
  } catch (e) {
    $bot.remove();
    addBubble('error', e.message);
  } finally {
    $bot.classList.remove('pending');
    busy = false;
    $send.disabled = false;
    $input.focus();
  }
}

// ─────────────────────────────────────────────────────────────
// 입력 이벤트
// ─────────────────────────────────────────────────────────────
$send.onclick = send;

$input.addEventListener('keydown', (e) => {
  // Enter는 전송, Shift+Enter는 줄바꿈.
  // isComposing 검사가 없으면 한글 입력 중 조합을 확정하는 Enter가 전송으로 잡힌다.
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
    e.preventDefault();
    send();
  }
});

// 입력창 높이를 내용에 맞춰 늘린다.
$input.addEventListener('input', () => {
  $input.style.height = 'auto';
  $input.style.height = Math.min($input.scrollHeight, 140) + 'px';
});

$reset.onclick = () => {
  $log.innerHTML = '<div id="empty">말투를 고르고 아무 말이나 걸어보세요.</div>';
  $input.focus();
};

// ─────────────────────────────────────────────────────────────
// 업데이트
//
// 서버는 켜질 때 한 번만 버전을 확인한다. 여기서는 그 결과를 받아 배너를 띄울 뿐이다.
// 최소버전 미만이었다면 서버가 시작 단계에서 스스로 교체·재시작하므로, 이 화면이
// 보이는 시점에 남아 있는 업데이트는 전부 "선택"이다.
// ─────────────────────────────────────────────────────────────
const $updateBar = document.getElementById('update-bar');
const $updateText = document.getElementById('update-text');
const $updateNow = document.getElementById('update-now');
const $updateLater = document.getElementById('update-later');
const $version = document.getElementById('version');

async function checkUpdate() {
  try {
    const res = await fetch('/api/update');
    const data = await res.json();
    // current 는 업데이트 유무와 상관없이 항상 온다. 헤더의 버전 표기를 여기서 채운다.
    if (data.current) $version.textContent = `v${data.current}`;
    if (!data.updateAvailable) return;

    const notes = data.notes ? ` — <span id="update-notes">${escapeHtml(data.notes)}</span>` : '';
    $updateText.innerHTML =
      `새 버전 <strong>v${escapeHtml(data.latest)}</strong> 이 있습니다 (현재 v${escapeHtml(data.current)})${notes}`;
    $updateBar.classList.add('show');
  } catch {
    // 업데이트 확인 실패는 대화에 아무 영향이 없다. 조용히 넘어간다.
  }
}

$updateNow.onclick = async () => {
  $updateNow.disabled = true;
  $updateLater.disabled = true;
  $updateText.textContent = '내려받는 중입니다. 창을 닫지 마세요...';

  try {
    const res = await fetch('/api/update/apply', { method: 'POST' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '업데이트 실패');

    // 서버가 새 바이너리로 재시작한다. 다시 살아날 때까지 기다렸다가 새로고침한다.
    $updateText.textContent = '재시작하는 중입니다...';
    await waitForRestart();
    location.reload();
  } catch (e) {
    $updateText.textContent = e.message + ' 나중에 다시 시도해주세요.';
    $updateLater.disabled = false;
  }
};

$updateLater.onclick = () => $updateBar.classList.remove('show');

/// /healthz 가 다시 응답할 때까지 폴링한다. 재시작에는 보통 1초도 안 걸린다.
async function waitForRestart() {
  for (let i = 0; i < 40; i++) {
    await new Promise((r) => setTimeout(r, 500));
    try {
      const res = await fetch('/healthz', { cache: 'no-store' });
      if (res.ok) return;
    } catch {
      // 아직 안 떴다. 계속 기다린다.
    }
  }
  throw new Error('재시작을 확인하지 못했습니다.');
}

/// 매니페스트의 notes 는 내가 쓰는 값이지만, HTML 로 그대로 넣는 습관은 들이지 않는다.
function escapeHtml(s) {
  const el = document.createElement('div');
  el.textContent = String(s);
  return el.innerHTML;
}

// ─────────────────────────────────────────────────────────────
// 테마
//
// MZ 세대 사이에서 유행한 먹거리에서 색을 딴 테마들. 선택하면 :root 에 data-theme 를
// 붙여 CSS 변수를 통째로 갈아끼우고, localStorage 에 저장해 다음 실행 때 복원한다.
// (첫 적용은 <head> 인라인 스크립트가 렌더 전에 이미 해 둔다 — 여긴 메뉴와 전환만.)
// ─────────────────────────────────────────────────────────────
// dark:true 인 테마는 이름 오른편에 초승달을 붙여 다크 테마임을 알린다.
const THEMES = [
  // '기본'은 시스템 자동(라이트/다크)이라 특정 색이 없다. 테마를 바꿔도 이 점이 따라
  // 변하지 않도록 var(--accent) 대신 라이트/다크 반반의 고정 점으로 표현한다.
  { id: '',         label: '기본',        dot: 'linear-gradient(135deg, #e6e8ec 0 50%, #171a21 50% 100%)' },
  { id: 'yogurt',   label: '요아정',      dot: '#e5809f' },
  { id: 'tanghulu', label: '탕후루',      dot: '#e5352f' },
  { id: 'matcha',   label: '말차',        dot: '#789a3c' },
  { id: 'dubai',    label: '두바이 초콜릿', dot: '#8fb84e', dark: true },
];

// 다크 테마 표식으로 쓸 초승달 아이콘.
const MOON_SVG =
  '<svg class="theme-moon" viewBox="0 0 24 24" width="13" height="13" aria-label="다크 테마"><path fill="currentColor" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';

const $settingsToggle = document.getElementById('settings-toggle');
const $settingsMenu = document.getElementById('settings-menu');
const $themeList = document.getElementById('theme-list');

// 현재 테마 id. 저장된 값이 THEMES 에 없으면(구버전 잔재 등) 기본으로 떨어뜨린다.
let currentTheme = localStorage.getItem('mz-theme') || '';
if (!THEMES.some((t) => t.id === currentTheme)) currentTheme = '';

function applyTheme(id) {
  currentTheme = id;
  if (id) document.documentElement.setAttribute('data-theme', id);
  else document.documentElement.removeAttribute('data-theme');  // 기본 = 시스템 자동 색
  try { localStorage.setItem('mz-theme', id); } catch (e) { /* 저장 실패는 무시 */ }

  // 체크 표시 갱신
  for (const item of $themeList.children) {
    item.setAttribute('aria-checked', String(item.dataset.id === id));
  }
}

// 테마 항목을 그린다.
for (const t of THEMES) {
  const item = document.createElement('button');
  item.type = 'button';
  item.className = 'theme-item';
  item.setAttribute('role', 'menuitemradio');
  item.dataset.id = t.id;
  item.innerHTML =
    `<span class="theme-dot" style="background:${t.dot}"></span>` +
    `<span class="theme-name">${t.label}</span>` +
    (t.dark ? MOON_SVG : '');
  item.onclick = () => { applyTheme(t.id); closeSettings(); };
  $themeList.appendChild(item);
}
applyTheme(currentTheme);  // 체크 표시 초기화(색은 이미 head 스크립트가 입혔다)

function openSettings() {
  $settingsMenu.hidden = false;
  $settingsToggle.setAttribute('aria-expanded', 'true');
}
function closeSettings() {
  $settingsMenu.hidden = true;
  $settingsToggle.setAttribute('aria-expanded', 'false');
}

$settingsToggle.onclick = (e) => {
  e.stopPropagation();
  $settingsMenu.hidden ? openSettings() : closeSettings();
};
// 바깥을 클릭하거나 ESC 를 누르면 닫는다.
document.addEventListener('click', (e) => {
  if (!$settingsMenu.hidden && !$settingsMenu.contains(e.target)) closeSettings();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeSettings();
});

// ─────────────────────────────────────────────────────────────
// 글자 크기
// --chat-font 변수를 바꾸면 #log 가 물려받아 말풍선 크기가 함께 바뀐다.
// (첫 적용은 <head> 인라인 스크립트가 이미 해 뒀다 — 여긴 세그먼트 상태만 맞춘다.)
// ─────────────────────────────────────────────────────────────
const $fontSeg = document.getElementById('font-seg');
let chatFont = localStorage.getItem('mz-font') || '15';  // 기본 15px

function applyFont(px) {
  chatFont = px;
  document.documentElement.style.setProperty('--chat-font', `${px}px`);
  try { localStorage.setItem('mz-font', px); } catch (e) { /* 무시 */ }
  for (const b of $fontSeg.children) {
    b.setAttribute('aria-pressed', String(b.dataset.size === px));
  }
}
for (const b of $fontSeg.children) b.onclick = () => applyFont(b.dataset.size);
applyFont(chatFont);

// ─────────────────────────────────────────────────────────────
// 마지막 말투 기억 토글
// ─────────────────────────────────────────────────────────────
const $rememberTone = document.getElementById('opt-remember-tone');
$rememberTone.checked = rememberTone;
$rememberTone.onchange = () => {
  rememberTone = $rememberTone.checked;
  try {
    localStorage.setItem('mz-remember-tone', rememberTone ? '1' : '0');
    // 켜는 순간 지금 말투를 기준으로 저장하고, 끄면 저장값을 지운다.
    if (rememberTone) localStorage.setItem('mz-default-tone', toneId);
    else localStorage.removeItem('mz-default-tone');
  } catch (e) { /* 무시 */ }
};

// ─────────────────────────────────────────────────────────────
// 시작 시 자동 실행 (Windows 전용)
// 서버가 supported:false 를 주면(비 Windows) 토글 행 자체를 숨긴다.
// ─────────────────────────────────────────────────────────────
const $autostartRow = document.getElementById('autostart-row');
const $autostart = document.getElementById('opt-autostart');

async function loadAutostart() {
  try {
    const res = await fetch('/api/autostart');
    const data = await res.json();
    if (!data.supported) { $autostartRow.style.display = 'none'; return; }
    $autostart.checked = data.enabled;
  } catch {
    // 상태를 못 읽으면 잘못된 토글을 보여주느니 숨긴다.
    $autostartRow.style.display = 'none';
  }
}

$autostart.onchange = async () => {
  const want = $autostart.checked;
  try {
    const res = await fetch('/api/autostart', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ enabled: want }),
    });
    if (!res.ok) throw new Error('설정 실패');
  } catch {
    // 레지스트리 쓰기에 실패하면 체크 상태를 원래대로 되돌린다.
    $autostart.checked = !want;
  }
};

loadPresets();
checkUpdate();
loadAutostart();
</script>
</body>
</html>
